    url: https://docs.aevo.xyz/
    email: ''
- name: Ribbon Finance Subgraph API
  description: GraphQL API hosted on The Graph protocol providing indexed on-chain
    data for Ribbon Finance vaults including vault performance metrics, historical
    pricing per share, fee collection data, premium earnings, and vault APY tracking
    for Theta Vaults and other Ribbon products on Ethereum mainnet.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.ribbon.finance/developers/ribbon-subgraph
  baseURL: https://thegraph.com/explorer/subgraph
