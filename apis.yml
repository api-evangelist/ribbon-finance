name: Ribbon Finance
description: Ribbon Finance is a DeFi structured products platform that helps users
  access crypto structured products through automated options strategies. The platform
  offers Theta Vaults (Decentralized Options Vaults) for covered calls and cash-secured
  puts, Ribbon Earn for yield optimization, and Ribbon Lend for unsecured lending.
  Ribbon Finance merged with Aevo, a high-performance Layer-2 order-book decentralized
  exchange for options and perpetuals trading, providing REST and WebSocket APIs for
  querying vault performance, options strategies, yield data, and live exchange trading
  data.
