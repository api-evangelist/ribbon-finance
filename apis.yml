apis:
- name: Aevo Exchange Public REST API
  description: Public unauthenticated REST API for Aevo exchange (the trading platform
    evolved from Ribbon Finance) providing market data, vault statistics, options
    pricing, funding rates, and other openly available trading information. No authentication
    required for these endpoints.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://api-docs.aevo.xyz/
  baseURL: https://api.aevo.xyz
  tags:
  - DeFi
  - Market Data
  - Options
  - Perpetuals
  - Public
  properties:
  - type: Documentation
    url: https://api-docs.aevo.xyz/reference/overview
  - type: OpenAPI
    url: https://raw.githubusercontent.com/api-evangelist/ribbon-finance/refs/heads/main/openapi/aevo-public-rest-api.json
  contact:
  - FN: Aevo Support
    url: https://docs.aevo.xyz/
    email: ''
- name: Aevo Exchange Private REST API
  description: Authenticated REST API for Aevo exchange providing account management,
    order placement and management, position tracking, portfolio data, transfers,
    withdrawals, and trading history. Requires AEVO-KEY and AEVO-SECRET authentication
    headers obtained via cryptographic key registration.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://api-docs.aevo.xyz/
  baseURL: https://api.aevo.xyz
  tags:
  - DeFi
  - Trading
  - Orders
  - Account
  - Authenticated
  properties:
  - type: Documentation
    url: https://api-docs.aevo.xyz/reference/overview
  - type: Authentication
    url: https://api-docs.aevo.xyz/reference/authentication
  - type: OpenAPI
    url: https://raw.githubusercontent.com/api-evangelist/ribbon-finance/refs/heads/main/openapi/aevo-private-rest-api.json
  contact:
