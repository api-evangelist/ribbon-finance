    url: https://docs.aevo.xyz/
    email: ''
- name: Aevo Exchange WebSocket API
  description: Real-time WebSocket API for Aevo exchange providing low-latency streams
    for orderbook updates, trade feeds, position fills, index price updates, funding
    rates, and ticker information. Supports both public and authenticated private
    channels.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://api-docs.aevo.xyz/
  baseURL: wss://ws.aevo.xyz
  tags:
  - DeFi
  - WebSocket
  - Real-time
  - Streaming
  - Market Data
  properties:
