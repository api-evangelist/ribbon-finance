name: Ribbon Finance / Aevo FinOps
description: Financial operations considerations for teams integrating with Ribbon Finance and Aevo APIs. The APIs themselves are free to access; costs arise from on-chain gas fees, vault participation protocol fees, and exchange trading fees.
url: https://docs.ribbon.finance/

costs:

  - name: API Access Cost
    description: Both public and authenticated Aevo REST and WebSocket APIs are free to access with no subscription, usage, or data fees.
    type: Fixed
    amount: 0.00
    currency: USD
    unit: month
    notes: No metered billing, no API call charges, no subscription tiers required for API access

  - name: Theta Vault Management Fee
    description: Annual management fee charged on assets under management in Ribbon Finance Theta Vaults. Deducted weekly on a pro-rated basis.
    type: Percentage
    amount: 2.00
    currency: Percent
    unit: year (AUM)
    notes: Annualized fee applied weekly. Applies regardless of vault profitability for that week.

  - name: Theta Vault Performance Fee
    description: Performance fee charged on profits generated by Theta Vault strategies in profitable weeks only. Not charged on weeks where the vault strategy loses money.
    type: Percentage
    amount: 10.00
    currency: Percent
    unit: weekly profit
    notes: Only charged on profitable weeks. No fee if the vault's options strategy expires worthless or loses premium.

  - name: Protocol Fee Distribution
    description: Protocol fees collected from Theta Vaults are split between the DAO treasury and RBN stakers (veRBN holders).
    type: Split
    treasuryShare: 50%
    veRBNHolderShare: 50% (converted to ETH and distributed)
    notes: Fee distribution governed by RBN tokenomics and Ribbonomics framework

  - name: Ethereum Gas Fees
    description: On-chain interactions with Ribbon Finance smart contracts (deposits, withdrawals, staking, governance) require Ethereum gas fees paid in ETH. Costs vary based on network congestion.
    type: Variable
    currency: ETH
    unit: per transaction
    notes: Gas costs apply to Ethereum mainnet contract interactions. Aevo exchange trading operates on Aevo L2 (OP Stack rollup) with lower gas costs.

  - name: Aevo L2 Trading Fees
    description: Trading fees on the Aevo exchange L2 follow a maker/taker model. Specific fee tiers may vary based on trading volume and AEVO token staking.
    type: Variable
    model: Maker/Taker
    currency: USD (settled in USDC)
    notes: Consult https://docs.aevo.xyz for current fee schedules and volume tier discounts

budgetConsiderations:
  - description: API integrations themselves are zero-cost. Budget planning should focus on gas costs for on-chain actions and trading fees for active exchange usage.
  - description: Teams running automated strategies via the Aevo API should model trading fees as a percentage of volume.
  - description: Vault depositors should account for the 2% management fee annually and 10% performance fee on profitable weeks when modeling expected returns.
  - description: Monitor ETH gas prices for timing large on-chain deposits or withdrawals to minimize transaction costs.
